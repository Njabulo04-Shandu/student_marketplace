<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-2xl border p-8 max-w-md w-full shadow-xl">
        <div class="text-center mb-6">
            <span class="text-2xl font-bold text-[#003261]">C.U.T.</span>
            <span class="text-gray-600"> Student Marketplace</span>
        </div>
        <div class="flex gap-2 mb-6 border-b">
            <button id="loginTab" class="flex-1 py-2 text-center font-semibold text-[#c8102e] border-b-2 border-[#c8102e]">Login</button>
            <button id="signupTab" class="flex-1 py-2 text-center text-gray-500">Sign Up</button>
        </div>
        <!-- Email/Password Forms -->
        <div id="loginFormContainer">
            <form id="loginForm" class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email" required class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]">
                <input type="password" id="loginPassword" placeholder="Password" required class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]">
                <button type="submit" class="w-full bg-[#003261] hover:bg-[#002050] text-white font-semibold py-2.5 rounded-xl">Login</button>
            </form>
        </div>
        <div id="signupFormContainer" style="display:none;" class="space-y-4">
            <form id="signupForm" class="space-y-4">
                <input type="text" id="signupName" placeholder="Full Name" required class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]">
                <input type="email" id="signupEmail" placeholder="Email" required class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]">
                <input type="password" id="signupPassword" placeholder="Password" required class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]">
                <button type="submit" class="w-full bg-[#c8102e] hover:bg-[#a00d24] text-white font-semibold py-2.5 rounded-xl">Create Account</button>
            </form>
        </div>

        <!-- Divider -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">Or continue with</span></div>
        </div>

        <!-- Google Sign-In Button -->
        <button id="googleLoginBtn" class="w-full flex items-center justify-center gap-2 bg-white border border-gray-300 rounded-xl py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
            <img src="https://www.google.com/favicon.ico" alt="Google" class="w-5 h-5"> Sign in with Google
        </button>
    </div>

    <script>
        window.initSupabase();
    </script>
    <script src="script.js"></script>
</body>
</html>
