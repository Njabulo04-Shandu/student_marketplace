<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell - Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-50 hero-gradient shadow-lg">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <span class="text-white font-bold text-xl tracking-tight">C<span class="text-[#ffcd00]">.</span>U<span class="text-[#ffcd00]">.</span>T<span class="text-[#ffcd00]">.</span></span>
                <span class="text-white/80 text-sm hidden sm:block">Student Marketplace</span>
            </a>
            <div class="hidden md:flex items-center gap-1">
                <a href="index.html" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-white/70 hover:text-white hover:bg-white/10">Home</a>
                <a href="dashboard.html" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-white/70 hover:text-white hover:bg-white/10">Sell</a>
                <a href="inbox.html" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-white/70 hover:text-white hover:bg-white/10">Inbox</a>
                <a href="#" id="authLink" class="ml-3 h-9 w-9 rounded-full bg-[#c8102e] flex items-center justify-center text-white font-semibold text-sm hover:bg-[#a00d24] transition-colors">?</a>
            </div>
            <button id="hamburger" class="md:hidden text-white p-2 text-2xl">☰</button>
        </div>
        <div id="mobileMenu" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm md:hidden"><!-- same as index.html --></div>
    </header>
    <main class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-[#003261] mb-6">My Listings</h1>
        <div id="userInfo" class="text-sm text-gray-600 mb-4"></div>
        <div class="bg-white rounded-2xl border p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">➕ Add New Product</h2>
            <form id="addProductForm" class="space-y-4">
                <input type="text" id="productTitle" placeholder="Title" required class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]">
                <input type="number" id="productPrice" placeholder="Price (R)" step="0.01" required class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]">
                <textarea id="productDesc" placeholder="Description" rows="3" class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]"></textarea>
                <select id="productCategory" class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]">
                    <option value="Textbooks">Textbooks</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Stationery">Stationery</option>
                    <option value="Other">Other</option>
                </select>
                <label class="flex items-center gap-3 cursor-pointer bg-gray-100 rounded-xl px-4 py-3 border-2 border-dashed border-gray-300 hover:border-[#003261] transition-colors">
                    <span class="text-gray-500">📷</span>
                    <span id="fileName" class="text-sm text-gray-500">Upload image</span>
                    <input type="file" id="productImage" accept="image/*" class="hidden">
                </label>
                <button type="submit" class="w-full bg-[#003261] hover:bg-[#002050] text-white font-semibold py-2.5 rounded-xl">List Product</button>
            </form>
        </div>
        <div id="myProductsList" class="space-y-3"></div>
    </main>
    <script>window.initSupabase();</script>
    <script src="script.js"></script>
</body>
</html>
