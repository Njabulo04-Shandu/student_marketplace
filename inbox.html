<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-50 hero-gradient shadow-lg"><!-- same header as index.html --></header>
    <main class="max-w-2xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-[#003261] mb-6">Inbox</h1>
        <div id="conversationsList" class="space-y-2"></div>
    </main>
    <!-- Chat Modal (hidden by default) -->
    <div id="chatModal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md flex flex-col max-h-[80vh]">
            <div class="flex items-center justify-between p-4 border-b">
                <div><p id="chatOtherName" class="font-semibold"></p><p id="chatProductTitle" class="text-xs text-gray-500"></p></div>
                <button id="closeChatBtn" class="text-gray-500 hover:text-gray-700 text-2xl">✕</button>
            </div>
            <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-3 min-h-[200px]"></div>
            <div class="p-4 border-t flex gap-2">
                <input id="chatMessageInput" type="text" placeholder="Type a message..." class="flex-1 bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]">
                <button id="sendMsgBtn" class="bg-[#c8102e] hover:bg-[#a00d24] text-white px-4 py-2 rounded-xl">Send</button>
            </div>
        </div>
    </div>
    <script>window.initSupabase();</script>
    <script src="script.js"></script>
</body>
</html>
