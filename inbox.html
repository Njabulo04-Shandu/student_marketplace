<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - Student Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <span class="cut">C.U.T.</span>
            <span class="marketplace">Student Marketplace</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Sell</a>
            <a href="inbox.html">Inbox</a>
            <a href="#" id="authLink">Login</a>
        </div>
    </nav>
    <div class="container">
        <h1>Your Inbox</h1>
        <div id="conversationsList"></div>
    </div>
    <div id="chatModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeChat()">&times;</span>
            <h3 id="chatProductTitle"></h3>
            <div id="chatMessages" class="chat-messages"></div>
            <textarea id="chatMessageInput" placeholder="Type your message..."></textarea>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
