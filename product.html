<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-50 hero-gradient shadow-lg"><!-- same header --></header>
    <main class="max-w-4xl mx-auto px-4 py-8" id="productDetail"></main>
    <div id="messageBox" class="max-w-4xl mx-auto px-4 pb-8 hidden">
        <div class="bg-white rounded-2xl border p-6">
            <h3 class="font-semibold mb-2">Message Seller</h3>
            <textarea id="messageText" rows="2" placeholder="Ask about this product..." class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#003261]"></textarea>
            <button id="sendMsgBtn" class="mt-3 bg-[#003261] hover:bg-[#002050] text-white font-semibold px-6 py-2 rounded-xl">Send Message</button>
        </div>
    </div>
    <script>window.initSupabase();</script>
    <script src="script.js"></script>
</body>
</html>
