<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-50 hero-gradient shadow-lg"><!-- same header but with Admin link --></header>
    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="flex items-center gap-3 mb-6">
            <span class="text-2xl">🛡️</span>
            <h1 class="text-2xl font-bold text-[#003261]">Admin Dashboard</h1>
        </div>
        <div id="stats" class="grid grid-cols-2 gap-4 mb-8"></div>
        <h2 class="font-semibold text-lg mb-3">All Products</h2>
        <div id="allProductsList" class="bg-white rounded-xl border divide-y mb-8"></div>
        <h2 class="font-semibold text-lg mb-3">All Users</h2>
        <div id="allUsersList" class="bg-white rounded-xl border divide-y"></div>
    </main>
    <script>window.initSupabase();</script>
    <script src="script.js"></script>
</body>
</html>
